version: '3.8'

services:
  # 1. MySQL 資料庫服務
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-union_db}
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-1234}"  # 與 .env 的 DB_PASSWORD 一致
    ports:
      - "${DB_PORT:-3306}:3306"  # 對外映射埠改讀取 .env 的 DB_PORT，讓本機的 Python 匯入程式可以直接連線
    volumes:
      # 持久化資料庫數據，防止容器重啟時資料遺失
      - mysql-data:/var/lib/mysql
      # Docker MySQL 初始化特性：容器首次啟動時會自動執行此資料夾下的 .sql 檔案建表
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - union-network



volumes:
  mysql-data:  # 定義持久化資料卷

networks:
  union-network:
    driver: bridge
