# Services Functional Layer Sub-System Map (ADAD Sub-Map Version 34.1)
# Scope: services/ (Backend Data Services & Calculation Engines)

version: 34.1
scope: services_layer

modules:
  DbService:
    type: service
    description: 主資料庫與 CRUD 操作服務，提供 v_order_details 視窗查詢、36 欄位安全 mapping、safe_int 與 safe_date 防護，以及完整 15 大照護細節 (產婦過敏、飲食酒油喜忌、烹煮工具、洗澡水、哺乳方式、三節與胎數) 之 JSON 備註自動解包解析器 (JsonNotesParser Engine)。
    source: services/db_service.py
    dependencies: [InitDB]
    todo:
      - "[ ] 檢查 global_stats 的全域統計運算邏輯與邊界條件 (INV-SVC-04)"
    state: validated
    invariants:
      - "INV-SVC-03: DbService 必須自動辨識與解析 notes / care_details 欄位中的 JSON 結構，解開完整 15 項產婦照顧與環境細節欄位，打平注入訂單字典中。"

  CalendarService:
    type: service
    description: 排班與行事曆精算引擎。包含 calculate_attendance_schedule 出勤天數精算、每週預設排休帶入、動態休假順延計算與國定假日加給計費。
    source: services/db_service.py::calculate_attendance_schedule
    invariants:
      - "INV-SVC-01: calculate_attendance_schedule 必須依據 service_mode 自動鎖定週休1日 (週日) 或週休2日 (週六日) 的每週排休。"
      - "INV-SVC-02: custom_holiday_rest_dates 為 None 時，預設將服務區間內所有國定假日全數納入放假順延。"
