  ContractContextRouter:
    type: api_router
    description: Read-only staff-service contract context by case_no and formal assignment.
    source: api/routes/contracts.py
    domain: null
    subsystem: null
    map_file: api\api_system_map.md
    dependencies: []
    input:
      case_no: canonical order identifier
      assignment_id: optional formal assignment selector
    output:
      staff_contract_context: order, client, BeClass, selected assignment and staff
        facts
    exceptions: []
    invariants:
    - All reads use case_no and optional assignment_id; no orders.id or legacy payment
      view is used.
    - The endpoint is read-only and does not alter the original contract workbook.
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_contract_context_router.py
        - -q
        cwd: project
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - Read order and client contract facts by case_no, then BeClass by query_no =
      case_no.
    - Read formal case_staff_assignments; require assignment_id when more than one
      active assignment exists, and never infer the recipient from orders.staff_id.
    - Return null for approved-but-unmapped template fields; never write orders, templates,
      or payments.
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: api_layer
    state: deployed
    fan_in_snapshot: 0
