  FinanceRouterRegistration:
    type: api_entrypoint
    description: Register contract, finance-report, finance-alert and multi-caregiver
      schedule routers with the running FastAPI application.
    source: api/main.py
    domain: null
    subsystem: null
    map_file: api\api_system_map.md
    dependencies:
    - MultiCaregiverScheduleRouter
    - MultiCaregiverScheduleReadRouter
    - MultiCaregiverCaseAssignmentListRouter
    input: {}
    output: {}
    exceptions: []
    invariants:
    - Register each new router exactly once without removing existing routers.
    - finance_alerts.router 必須只註冊一次；不得用另一個 FastAPI app 或重複 prefix 規避既有入口。
    - multi_caregiver_schedule.router 必須只註冊一次；不得建立另一個 FastAPI app、重複 prefix 或呼叫 legacy
      schedule router。
    - multi_caregiver_schedule_read.router 必須只註冊一次；不得建立另一個 FastAPI app、重複 prefix 或改以
      legacy schedule router 提供查詢。
    - multi_caregiver_case_assignments.router 必須只註冊一次；不得建立另一個 FastAPI app、重複 prefix
      或以 legacy 排班資料合成案件指派選單。
    - 'INV-START-01: 腳本必須使用 Python 輪詢確認 MySQL 連線已可被接受，始可開始啟動後端與監控服務防止連線逾時崩潰。'
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -c
        - from pathlib import Path; s=Path('api/main.py').read_text(encoding='utf-8');
          assert 'contracts.router' in s and 'finance_reports.router' in s and 'finance_alerts.router'
          in s and 'multi_caregiver_schedule.router' in s and 'multi_caregiver_schedule_read.router'
          in s and 'multi_caregiver_case_assignments.router' in s; assert s.count('app.include_router(finance_alerts.router)')
          == 1; assert s.count('app.include_router(multi_caregiver_schedule.router)')
          == 1; assert s.count('app.include_router(multi_caregiver_schedule_read.router)')
          == 1; assert s.count('app.include_router(multi_caregiver_case_assignments.router)')
          == 1; print('ADMIN ROUTERS REGISTERED')
        cwd: project
        timeout: 60
        expect_exit: 0
        expect_stdout_contains: ADMIN ROUTERS REGISTERED
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: low
