  FinanceAlertRouter:
    type: api_router
    description: 提供財務警示清單、詳細資料、人工認領與解除端點；警示建立及正式交易修正不對 UI 開放。
    source: api/routes/finance_alerts.py
    domain: null
    subsystem: null
    map_file: api\api_system_map.md
    dependencies:
    - FinanceAlertWorkflowService
    input:
      filters: status、alert_code、source_domain 及分頁條件
      workflow_action: alert_id、非空 operator reference 與 resolve reason
    output:
      alerts: 稽核清單、詳細快照與事件歷程
      action_result: existing、claimed、resolved 或 conflict
    exceptions: []
    invariants:
    - Router 只提供 list、detail、claim、resolve；不得提供任意 PATCH、任意事件建立或由 UI 建立警示的端點。
    - claim／resolve 必須委派 FinanceAlertWorkflowService，不得直接更新 finance_alerts、finance_alert_events
      或任何正式帳務表。
    - conflict、not found 與 invalid transition 必須使用明確 HTTP 狀態；不得吞掉成成功。
    - resolve reason 與 operator reference 必須非空；本階段不在 B6 內另建 RBAC 或身份系統。
    preferred_pattern: none
    verification:
    - must_have_assertions
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_finance_alert_router.py
        - -q
        - -p
        - no:cacheprovider
        - --basetemp
        - C:\tmp\pytest-b6-finance-alert-router
        cwd: project
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 驗證查詢與 action payload，將 list/detail/claim/resolve 委派給 FinanceAlertWorkflowService。
    - 回傳候選 snapshot、expected/actual/difference 與事件歷程；不推測候選或觸發正式核銷。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: api_layer
    state: deployed
    fan_in_snapshot: 1
    known_symbols:
    - ClaimFinanceAlertRequest.operator_must_not_be_blank
    - ResolveFinanceAlertRequest.reason_must_not_be_blank
    - _run_action
    - _workflow_error
    - claim_alert
    - get_alert
    - list_alerts
    - resolve_alert
  FinanceRouterRegistration:
    type: api_entrypoint
    description: Register contract, finance-report and finance-alert routers with
      the running FastAPI application.
    source: api/main.py
    domain: null
    subsystem: null
    map_file: api\api_system_map.md
    dependencies: []
    input: {}
    output: {}
    exceptions: []
    invariants:
    - Register each new router exactly once without removing existing routers.
    - finance_alerts.router 必須只註冊一次；不得用另一個 FastAPI app 或重複 prefix 規避既有入口。
    - 'INV-START-01: 腳本必須使用 Python 輪詢確認 MySQL 連線已可被接受，始可開始啟動後端與監控服務防止連線逾時崩潰。'
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -c
        - from pathlib import Path; s=Path('api/main.py').read_text(encoding='utf-8');
          assert 'contracts.router' in s and 'finance_reports.router' in s and 'finance_alerts.router'
          in s; assert s.count('app.include_router(finance_alerts.router)') == 1;
          print('FINANCE ROUTERS REGISTERED')
        cwd: project
        expect_exit: 0
        expect_stdout_contains: FINANCE ROUTERS REGISTERED
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm: []
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
