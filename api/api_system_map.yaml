version: 3.0
scope: api_layer
modules:
  OrderRouter:
    type: api_router
    description: 訂單、時程精算與明確多月嫂指派同步 API 路由；同步端點接收完整非取消訂單目標值，只委派已部署的 Preview／Apply 服務，不能直接寫入正式資料表。
    source: api/routes/orders.py
    domain: null
    subsystem: null
    map_file: api\api_system_map.md
    dependencies:
    - DbService
    - OrderSchemas
    - OrderAssignmentSynchronizationPreviewService
    - OrderAssignmentSynchronizationApplyService
    input:
      case_no: path 中的 canonical order identifier。
      preview_request: 包含排班關鍵欄位與可編輯訂單主資料完整目標值的 order_change，以及完整明確 assignment_plan。
      apply_request: preview_request 加上完整 schedule_change_plan.remove_schedule_ids
        與非空 applied_by。
    output:
      synchronization_preview: target hours、指派時數影響、required_schedule_removals、sync_status
        與 blocking_reasons。
      synchronization_apply_result: 已套用結果、排班生成摘要、時數確認與 audit_id。
    exceptions: []
    invariants:
    - 兩個同步端點不得直接呼叫 db_service 寫入 orders、case_staff_assignments、staff_schedule、付款、月結或稽核表；所有同步商業操作只能委派對應服務。
    - Preview 必須是唯讀；Apply request 必須同時提供完整 assignment_plan、schedule_change_plan.remove_schedule_ids
      與非空 applied_by，缺少時不得呼叫 Apply 服務。
    - 同步端點不得自行寫入訂單或客戶主資料；更新必須由 Apply service 的單一 transaction 完成。EditOrderUI 不得以 `/full-details`
      先寫入同一份同步變更。
    - API 不得接受 clients.identity_status 或 identity_status；身分資格只能由服務層依 case_no 關聯 clients.identity_status
      讀取。
    - Router 不得建立第二個 FastAPI app 或重複註冊；必須沿用既有 `/api/v1/orders` router 與 BaseResponse
      包裝。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_order_assignment_synchronization_router.py
        - tests\test_order_assignment_synchronization_app_routes.py
        - -q
        - -p
        - no:cacheprovider
        - --basetemp
        - C:\tmp\pytest-order-assignment-router
        cwd: project
        timeout: 60
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - '`POST /{case_no}/assignment-synchronization/preview` 驗證完整非取消 order_change（不含
      identity_status 或 clients.identity_status）與 HTTP payload 後，僅委派 OrderAssignmentSynchronizationPreviewService，並以
      BaseResponse 回傳其完整結果。'
    - '`POST /{case_no}/assignment-synchronization/apply` 驗證完整移除計畫及 applied_by 後，僅委派
      OrderAssignmentSynchronizationApplyService；未套用的 locked、requires_review 或 requires_allocation
      結果須回傳明確 HTTP 409 與原因。'
    - 服務層的 ValueError 必須轉成明確 HTTP 422；不得由 router 吞掉後回傳成功。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: api_layer
    state: dirty
    fan_in_snapshot: 1
    known_symbols:
    - apply_order_assignment_synchronization
    - calculate_schedule
    - get_all_orders
    - get_order_by_case_no
    - preview_order_assignment_synchronization
    - update_order_full_details
    - update_order_status
