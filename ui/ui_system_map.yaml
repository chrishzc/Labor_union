  CalendarUI:
    type: ui_page
    description: 服務人員行事曆與檔期調控獨立頁面。除既有月曆模式外，提供多月嫂案件→正式服務指派選擇、指派專屬日排班呈現與單日調整。
    source: ui/pages/03_calendar.py::show
    domain: null
    subsystem: null
    map_file: ui\ui_system_map.md
    dependencies:
    - MultiCaregiverCaseAssignmentListRouter
    - MultiCaregiverScheduleReadRouter
    - MultiCaregiverScheduleRouter
    input: {}
    output: {}
    exceptions: []
    invariants:
    - 'INV-CAL-01: 必須在 HTML 月曆表格繪製前優先執行精算引擎，確保休假天數即時 100% 連動呈現。'
    - 'INV-CAL-02 (兩階段選單隔離): 「訂單匹配」模式僅於行事曆展示黃底預排與 7 天預留備用期，不顯示單日排假與出勤精算面板；「出勤天數精算」模式僅適用於確定實際開工日
      (actual_start_date) 案件，解鎖紅底工作日與綠底休假排假控制。'
    - 'INV-CAL-03 (四色月曆視覺公理): ⚪白底=無排班或超出完工日解鎖區間; 🟡黃底=預排案件與完工日後 7 天預留備用期; 🔴紅底=確定服務工作日;
      🟢綠底=自訂請假與國定假日放假。'
    - 'INV-CAL-04 (綠底休假與動態順延): 每增加 1 天綠底 🟢 休假，後續紅底 🔴 工作日與服務結束日 (actual_end_date) 自動向後動態順延
      1 天，確保實際服務天數 100% 足額達 N 天。'
    - 'INV-CAL-05 (國定假日單日獨立決策): 支援連假期間針對每一個獨立國定假日進行單日個體勾選；選擇放假者在月曆標示為綠底 🟢 且完工日順延 1
      天，選擇上班者計為紅底 🔴 正常工作日 (預設雙倍薪資)。'
    - 多月嫂模式必須先選 case_no、再從該案件 API 回傳的正式指派中選 assignment_id；不得由 orders.staff_id、日期或姓名推測指派。
    - 多月嫂模式只透過 MultiCaregiverCaseAssignmentListRouter、MultiCaregiverScheduleReadRouter
      與 MultiCaregiverScheduleRouter 讀寫；不得呼叫 legacy 排班 helper。
    - 不提供同日分時段、planned_hours 或 actual_hours 手動輸入；單日請假不自動延伸、覆寫或移動下一位月嫂的服務區段。
