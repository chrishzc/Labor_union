# UI Layer Sub-System Map (ADAD Sub-Map Version 54.0)
# Scope: ui/ (All UI Shells, Pages, and Components)

version: 54.0
scope: ui_layer

modules:
  AppShellUI:
    type: ui_shell
    description: Streamlit 側邊欄導覽殼層，動態載入 ui/pages/ 頁面。
    source: ui/app.py
    dependencies: [DataBrowserUI, OrderUI, CalendarUI, EditOrderUI, FormManagementUI]

  DataBrowserUI:
    type: ui_page
    description: 原始資料庫表格瀏覽頁面。提供 clients, staff, orders, payments, beclass_records, matching_records, holidays 與 staff_bank_accounts 檢視，以及國定假日管理面板。
    source: ui/pages/01_data_browser.py::show
    dependencies: [DbService]
    state: validated
    invariants:
      - "INV-UI-BROWSER-01: 原始資料表格欄位必須支援透過對照表轉換為中文名稱 (含英文原鍵名或純中文)，未記錄欄位自動安全回退原鍵名。"
    api_button_matrix:
      - button_label: "確認儲存假日"
        api_endpoint: "POST /api/v1/holidays"
        description: "新增或更新國定假日及其預設雙倍薪資設定"
      - button_label: "確認刪除此假日"
        api_endpoint: "DELETE /api/v1/holidays/{holiday_date}"
        description: "刪除指定日期之國定假日"

  OrderUI:
    type: ui_page
    description: 訂單與帳務管理系統殼層。負責讀取初始化資料（orders, clients, staff）並分發至三個子 Tab 渲染函數。
    source: ui/pages/02_orders.py::show
    dependencies: [OrderUI_Tab1_Overview, OrderUI_Tab2_Assign, OrderUI_Tab3_Finance]
    invariants:
      - "INV-UI-01: 所有費用與金額數字統一無條件四捨五入整數化呈現 (帶千分位)，無小數點。"
      - "INV-UI-02: 必須透過 safe_int() 轉換數值，防範 NaN, None, Inf 及空字串導致的 ValueError 崩潰。"

  OrderUI_Tab1_Overview:
    type: ui_component
    description: Tab 1 總覽表格。完全對齊 36 個完整訂單欄位清單。
    source: ui/pages/02_orders.py::_render_tab1_overview

  OrderUI_Tab2_Assign:
    type: ui_component
    description: Tab 2 渲染函數 (案件與配對中心)。僅列出「洽談中」待配對案件，提供單筆案件控制面板、4 大智慧粗篩可選條件 (含香山區等 city/address 比對與 7 天預留備用期) 與 4 步智慧配對流程。
    source: ui/pages/02_orders.py::_render_tab2_assign
    state: validated
    invariants:
      - "INV-UI-ASSIGN-01: 媒合紀錄清單僅能顯示至少有一項發送紀錄 (sent_info_1_at/sent_info_2_at) 或意願已變更的有效紀錄。"
      - "INV-UI-ASSIGN-02: 選取月嫂檢視時嚴禁 speculative 預先建立 DB 紀錄，必須在點擊發送/變更動作時按需 (On-Demand) 建立。"
    api_button_matrix:
      - button_label: "1️⃣ 發送 訂單資訊-1 (粗篩)"
        api_endpoint: "POST /api/v1/matches/{match_id}/send-info-1"
        description: "更新 sent_info_1_at 並依據月嫂 staff.line_user_id 推播粗篩 Flex Message 卡片"
      - button_label: "2️⃣ 發送 訂單資訊-2 (精篩)"
        api_endpoint: "POST /api/v1/matches/{match_id}/send-info-2"
        description: "更新 sent_info_2_at 並依據月嫂 staff.line_user_id 推播精篩照護圖譜訊息"
      - button_label: "更新意願"
        api_endpoint: "PUT /api/v1/matches/{match_id}/reply"
        description: "更新月嫂接案意願狀態 (1: 願意, 0: 拒絕, NULL: 待回覆)"
      - button_label: "🤝 3️⃣ 傳送履歷給客戶"
        api_endpoint: "POST /api/v1/matches/{match_id}/send-resume"
        description: "傳送去識別化履歷與過往經驗圖卡給客戶 LINE 帳號"
      - button_label: "✍️ 4️⃣ 成立訂單並定案指派"
        api_endpoint: "POST /api/v1/orders/{order_id}/assign-staff"
        description: "綁定服務人員並更新訂單狀態為「訂單成立」"
      - button_label: "🚨 確認取消此訂單"
        api_endpoint: "PUT /api/v1/orders/{order_id}/status"
        description: "將訂單狀態更新為「訂單取消」並強制寫入取消原因"

  OrderUI_Tab3_Finance:
    type: ui_component
    description: Tab 3 渲染函數。顯示財務實收登錄介面。
    source: ui/pages/02_orders.py::_render_tab3_finance
    api_button_matrix:
      - button_label: "更新財務記錄"
        api_endpoint: "PUT /api/v1/payments/{order_id}"
        description: "更新已收訂金、已收尾款與實收備註"

  CalendarUI:
    type: ui_page
    description: >
      服務人員行事曆與檔期調控獨立頁面。包含兩階段時間操作選單 (1. 執行操作: 單純看行事曆/訂單匹配/出勤天數精算; 2. 訂單選擇)、
      四色 HTML 月曆 (白/黃/紅/綠底)、7 天預留備用期動態渲染、國定假日單日獨立決策控制面板，以及持久化寫入 staff_schedule 檔期表。
    source: ui/pages/03_calendar.py::show
    state: validated
    invariants:
      - "INV-CAL-01: 必須在 HTML 月曆表格繪製前優先執行精算引擎，確保休假天數即時 100% 連動呈現。"
      - "INV-CAL-02 (兩階段選單隔離): 「訂單匹配」模式僅於行事曆展示黃底預排與 7 天預留備用期，不顯示單日排假與出勤精算面板；「出勤天數精算」模式僅適用於確定實際開工日 (actual_start_date) 案件，解鎖紅底工作日與綠底休假排假控制。"
      - "INV-CAL-03 (四色月曆視覺公理): ⚪白底=無排班或超出完工日解鎖區間; 🟡黃底=預排案件與完工日後 7 天預留備用期; 🔴紅底=確定服務工作日; 🟢綠底=自訂請假與國定假日放假。"
      - "INV-CAL-04 (綠底休假與動態順延): 每增加 1 天綠底 🟢 休假，後續紅底 🔴 工作日與服務結束日 (actual_end_date) 自動向後動態順延 1 天，確保實際服務天數 100% 足額達 N 天。"
      - "INV-CAL-05 (國定假日單日獨立決策): 支援連假期間針對每一個獨立國定假日進行單日個體勾選；選擇放假者在月曆標示為綠底 🟢 且完工日順延 1 天，選擇上班者計為紅底 🔴 正常工作日 (預設雙倍薪資)。"
    api_button_matrix:
      - button_label: "💾 儲存放假與動態順延 (寫入資料庫)"
        api_endpoint: "POST /api/v1/schedule/save"
        description: "將月嫂動態請假與國定假日順延排班明細持久化寫入 staff_schedule 資料表與 orders.custom_rest_dates"

  EditOrderUI:
    type: ui_page
    description: 單筆訂單動態試算與資料維護頁面。採用 st.columns 與帶邊框 Container 打造實體訂單單據視覺，具備 Formula Lock Guardrail 防呆機制。
    source: ui/pages/04_edit_order.py::show
    state: validated
    invariants:
      - "INV-EDIT-01: 修改輸入欄位時，費用與完工日必須即時連動試算，且金額統一無小數點 safe_int 呈現。"
      - "INV-EDIT-03: 所有由公式自動衍生之金額與時數欄位，預設必須為唯讀鎖定狀態。"
      - "INV-EDIT-04: 強制解鎖自動試算欄位時，必須顯性跳出警告告知公式連動失效風險。"
      - "INV-EDIT-05: 點擊儲存時必須同時調用 update_order_full_details 與 update_payment_details 完整寫入 orders, clients 與 payments 資料表。"
    api_button_matrix:
      - button_label: "💾 確定儲存 36 欄位試算與變更結果"
        api_endpoint: "PUT /api/v1/orders/{order_id}/full-details"
        description: "一次性寫入 orders 主表 36 欄位與 payments 實收財務表"

  FormManagementUI:
    type: ui_page
    description: "表單與履歷問卷管理專頁。支援動態新建自訂表單沙盒、線上編輯修改既有模板欄位名稱、拖拉平移排序、二次確認刪除防呆、5:5側邊雙視窗實時預覽/PDF導出、SQL原生資料表歸屬分類選擇器、獨立JSON模板目錄、Excel長文字溢出不撐高列高、顯式邊框與PDF乾淨去雜線、全量資料庫欄位100%開載、100%全寬滿版預覽切換器，以及 Tab 3: Excel 變數代理制式定型化契約引擎 (EPPP Engine)。"
    source: ui/pages/05_form_management.py::show
    state: validated
    invariants:
      - "INV-UI-FORM-01: 支援手動新增自訂欄位，並提供單行文字、多行文字、數字、日期與綁定 DB 欄位 5 大資料型態。"
      - "INV-UI-FORM-06: 實施 Draft Buffer 編輯草稿隔離機制，點擊取消時 100% 丟棄記憶體草稿，嚴禁修改硬碟。"
      - "INV-UI-FORM-09: 刪除表單模板必須具備二次顯性確認視窗 (Delete Confirmation Modal Guardrail)，防範誤觸刪除。"
      - "INV-UI-FORM-16: 支援 Excel 原生範本 (.xlsx) 之 {P1}, {P2} 變數標籤自動掃描解析器 (EPPP Protocol)。"
      - "INV-UI-FORM-25: 全量資料庫欄位 100% 完整開載公理 (Full Schema Enrollment Protocol): 掃描 orders, clients, staff, beclass_records 100+ 個全量欄位填入 UI 二階選單。"
      - "INV-UI-FORM-28: 100% 全寬滿版契約預覽切換公理 (Full-Width Contract Canvas Switcher Protocol): 提供 5:5 左右對照維護模式與 100% 全寬滿版 A4 沉浸預覽模式無縫切換。"
