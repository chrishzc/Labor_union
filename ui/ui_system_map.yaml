  EditOrderUI:
    type: ui_page
    description: 單筆訂單動態試算與資料維護頁面。採用 st.columns 與帶邊框 Container 打造實體訂單單據視覺，具備 Formula
      Lock Guardrail，以及訂單變更→完整月嫂指派→帳務／排班預覽→明確套用的一致性工作流。
    source: ui/pages/04_edit_order.py::render_editor,show
    domain: null
    subsystem: null
    map_file: ui\ui_system_map.md
    dependencies:
    - OrderRouter
    - MultiCaregiverCaseAssignmentListRouter
    - StaffRouter
    input:
      editable_order_change: 非取消訂單的完整訂單目標值，含排班關鍵欄位與客戶／訂單主資料。
      assignment_plan: 使用者明確建立或調整的完整正式月嫂服務區段；既有有效指派未列入時，UI 必須明示其為取消候選。
      applied_by: 非空操作識別；不得從月嫂姓名、訂單欄位或預設值推測。
    output:
      synchronization_preview: target_hours、差額、required_schedule_removals、帳務鎖定或人工覆核原因。
      synchronization_apply_result: 成功套用後的正式指派與排班摘要，並觸發訂單頁重新載入。
    exceptions: []
    invariants:
    - 'INV-EDIT-01: 修改輸入欄位時，費用與完工日必須即時連動試算，且金額統一無小數點 safe_int 呈現。'
    - 'INV-EDIT-03: 所有由公式自動衍生之金額與時數欄位，預設必須為唯讀鎖定狀態。'
    - 'INV-EDIT-04: 強制解鎖自動試算欄位時，必須顯性跳出警告告知公式連動失效風險。'
    - 'INV-EDIT-05: 任何含 service_days、service_hours_per_day、start_date、end_date、actual_start_date
      或 actual_end_date 的訂單變更，必須只經 OrderRouter 的 preview／apply 同步流程；不得先呼叫 db_service.update_order_full_details
      或 `/full-details`。'
    - 補助資格只能以 clients.identity_status 唯讀呈現；UI 不得提供修改控制項、不得傳送 identity_status 或 clients.identity_status，也不得讀取
      clients.identity_status。
    - 訂金應收日期可為空值，空值不得以今天或第一期應收日自動補值；送出同步請求時須保留 null。
    - 多月嫂正式指派只能由 case_no 的正式指派 API 建立或選取；不得由 orders.staff_id、媒合紀錄、姓名、日期或列表第一筆推測。
    - apply 前必須明確呈現並確認 required_schedule_removals；遇帳務鎖定、人工時數覆寫或時數差額時，不得繞過、靜默降級或顯示成功。
    - 帳務仍由新帳務介面獨立處理；本頁不得建立、調整或取消 client／staff payments、月結或轉帳。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_edit_order_synchronization_ui.py
        - -q
        - -p
        - no:cacheprovider
        - --basetemp
        - C:\tmp\pytest-edit-order-synchronization-ui
        cwd: project
        timeout: 60
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 讀取目前案件的 clients.identity_status 並以唯讀欄位顯示，要求使用者提交完整 assignment_plan；不得以 orders.staff_id、媒合紀錄或第一筆候選推測指派。
    - 對 OrderRouter preview 送出完整訂單目標值與指派計畫，清楚呈現時數差額、鎖定原因及 required_schedule_removals。
    - 「確定儲存」先要求有效且未過期的 preview；僅當 preview 可套用時，要求使用者逐筆明確確認全部 required_schedule_removals
      與非空 applied_by，再呼叫 OrderRouter apply；HTTP 409／422 必須顯示原始原因而非呈現成功。
    - apply 成功後清除本頁同步草稿並 rerun 重新讀取訂單；CalendarUI 下次顯示時由正式指派與日排班 API 重新讀取，不保留舊排班快取。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: ui_layer
    state: validated
    fan_in_snapshot: 2
