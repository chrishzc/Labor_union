      migrated_at: 明確的 UTC timestamp
    output:
      v3_candidate: 通過 validator 的 schema_version=3 Task JSON
      validation_errors: 不可遷移時的結構化錯誤
    exceptions: []
    invariants:
    - 只接受 schema_version=2；不得改寫輸入 mapping，也不得處理 v3 快照。
    - task_id、node_name、status、source_lock、rollback、source_hash、implementation_hash（若有）與既有
      history 必須等值保留；只能附加一筆 migration history event。
    - 不得讀寫檔案、archive、checkpoint、Git index 或 source lock，也不得自動改變 Task 狀態。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_migrate_adad_task_snapshots.py
        - -q
        - -p
        - no:cacheprovider
        - --basetemp
        - C:\tmp\pytest-adad-task-snapshot-transformer
        cwd: project
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 深拷貝輸入、檢查必要 v2 稽核欄位並補齊 v3 target 的必要預設欄位。
    - 將 schema_version 改為 3，附加可追溯 migration history event，保留原本 status 與 hash。
    - 呼叫 ADAD 1.6.2 snapshot validator；成功回傳 candidate，失敗回傳結構化錯誤。
