  OrderAmountCalculator:
    type: service
    description: Pure source-of-truth calculation for proposed client receivables,
      staff payables, subsidy claims, and payment dates before any ledger snapshot
      is written.
    source: services/order_amount_calculator.py
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies: []
    input:
      order_terms: case_no, claim total days/hours, service start date, subsidy eligibility,
        client floor-fee amount, and actual completion date
      assignments: optional staff service segments with their own hours, rate, and
        allocated floor fee
      collection_schedule: contract-selected deposit day count and deposit due date;
        first/second stage days and dates are derived by rule
    output:
      client_ledger_plan: three receivable stages, total prepaid amount, and reserved
        subsidy-return amount
      staff_payment_plans: one payable per assignment, with salary, floor fee, and
        due date
      subsidy_plan: claim amount, completion quarter, application month, and eligibility
        flag
    exceptions: []
    invariants:
    - The calculator is pure and must not import database, UI, or transaction-writing
      modules.
    - Returned totals are proposals only; persisted payment rows remain immutable
      snapshots, and manual adjustments are stored separately by ledger writers.
    - A full-subsidy case with client rate zero must have zero client receivable and
      zero subsidy-return amount.
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_order_amount_calculator.py
        - -q
        cwd: project
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 'Derive subsidy hours from eligibility and total service hours: general citizen
      min(40, total service hours), subsidized citizen min(120, total service hours),
      non-citizen 0; reject invalid stage day counts and assignment totals above the
      order total.'
    - 'Derive client rate from eligibility: non-citizen 350, general citizen 300,
      full-subsidy citizen 0. Calculate client receivables with that rate and explicit
      client floor fee. First stage days equal min(15, max(0, claim total days minus
      deposit days)); second stage days equal the remaining days.'
    - Calculate each staff payable from its assignment snapshot, keeping service salary
      and floor fee separate; no adjustment is applied here.
    - Calculate the case-level government subsidy claim by allocating subsidy hours
      across staff assignments in proportion to actual service hours, then summing
      allocated hours times each staff service rate. If the client prepaid subsidy
      amount is positive, reserve that amount as subsidy return; a zero client rate
      produces no client refund even when subsidy hours are positive.
    - 'First payment due date equals service start date. The second payment due date
      is initially null; after the first payment is fully received, ClientPaymentWriteService
      persists its actual received date plus 15 days. If second stage days are zero,
      its persisted date remains null and the UI displays 0. Derive staff due date
      from completion date: next month 15th when client receivable is positive, otherwise
      the following month 15th; derive subsidy claim quarter and its next-quarter
      application month.'
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    state: validated
    fan_in_snapshot: 0
    known_symbols:
    - _add_months
    - _claim_schedule
    - _collection_stages
    - _decimal
    - _number
    - _parse_date
    - _staff_payment_plans
    - _subsidy_claim_amount
    - calculate_order_amounts
  AccountingSourceProjection:
    type: service
    description: Read a case's accounting source facts from normalized raw tables,
      without using legacy payment tables or computed order views.
    source: services/accounting_source_projection.py
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies: []
    input:
      case_no: canonical case identifier
    output:
      accounting_source: raw client, BeClass, order, and staff-assignment facts keyed
        by case_no
      missing_terms: explicit list of contract schedule terms absent from raw data
        and therefore not eligible for implicit defaults
    exceptions: []
    invariants:
    - All source reads use case_no; no orders.id or order_id is selected or accepted.
    - Client data comes from clients and beclass_records; staff recipient data comes
      from staff and case_staff_assignments.
    - Missing money inputs are explicit errors/gaps, never replaced by legacy fixed
      values.
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_accounting_source_projection.py
        - -q
        cwd: project
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - Read client identity/contact facts from clients, order service facts from orders,
      and original application/refund facts from beclass_records by query_no = case_no.
    - Read every staff service segment from case_staff_assignments joined to staff;
      preserve each segment's actual/planned hours, hourly rate, and allocated floor
      fee.
    - Return raw source values only. Do not query payments, client_payments, staff_payments,
      v_order_details, or use fixed subsidy/rate fallbacks.
    - Flag missing contract schedule dates/day splits so the caller must supply the
      dates selected in the order form before invoking OrderAmountCalculator.
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    state: validated
    fan_in_snapshot: 0
    known_symbols:
    - _case_no
    - _missing_terms
    - load_case_accounting_source
  PaymentService:
    type: service
    description: 提供新帳務表的服務指派、月嫂應付與轉帳寫入服務；所有金額先經 PaymentRules 驗證，舊 payments 不得被讀寫。
    source: services/payment_service.py
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies: []
    input:
      case_no: canonical order identifier
      assignment: staff, hours, hourly rate and floor-fee allocation
      staff_payment: assignment-linked payable and transfer transaction
    output:
      case_staff_assignment: validated service segment
      staff_payment: assignment-linked payable with recalculated paid amount
    exceptions: []
    invariants:
    - 不得讀寫 legacy payments 表。
    - 月嫂應付必須關聯一筆正式服務指派；同一指派最多一筆應付摘要。
    - 任何新交易的 external_reference 重複時必須拒絕，失敗交易不得增加 amount_paid。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_payment_service.py
        - -q
        cwd: project
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 建立服務指派前鎖定案件既有分配，交由 PaymentRules 驗證時數與樓層費上限後寫入 case_staff_assignments。
    - 月嫂應付只能由 assignment_id 建立；服務薪資、樓層費與調整金額計算 total_payable，不從 orders.staff_id 推測。
