  AdadTaskSnapshotV2ToV3MigrationSpecification:
    type: documentation
    description: 定義 ADAD Task 快照由 schema v2 遷移至 v3 的獨立施工範圍、保存策略與驗收條件，解除 pre-commit
      對既有核准帳務變更的格式阻斷。
    source: document/ADAD Task 快照 v2→v3 相容性遷移規格.md
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies: []
    input:
      legacy_tasks: .agents/tasks/ 下 schema_version=2 的 Task 快照及其 source lock
      current_task_schema: ADAD 1.6.2 的 schema_version=3 契約
    output:
      migration_specification: 可核准的遷移步驟、失敗回復方式與驗收條件
    exceptions: []
    invariants:
    - 本節點只定義規格；不得執行 Task JSON 遷移、修改帳務商業程式、架構圖、checkpoint 或 Git index。
    - 未來遷移必須先保留每份 v2 原始快照的 byte-exact archive，且 dry-run 不得寫入任何檔案。
    - submitted 與 approved Task 的核准語意、task_id、source lock、baseline hash、implementation
      hash 與完整 history 必須保留；遷移不得自動核准、提交、駁回或釋放 lock。
    - v3 快照以驗證器可接受為最低條件；任何單筆失敗不得覆寫原 v2 快照，也不得影響其他 Task。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -c
        - from pathlib import Path; s=Path('document/ADAD Task 快照 v2→v3 相容性遷移規格.md').read_text(encoding='utf-8');
          required=['dry-run','byte-exact','submitted','approved','不自動核准','schema_version'];
          assert all(item in s for item in required); print('TASK SNAPSHOT MIGRATION
          SPECIFIED')
        cwd: project
        expect_exit: 0
        expect_stdout_contains: TASK SNAPSHOT MIGRATION SPECIFIED
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 盤點 v2 快照、狀態、來源與 lock，先輸出不寫入的 migration manifest。
    - 為每筆快照建立可回復 archive，再依 v3 契約補齊必要欄位與 migration history event，保持既有狀態與稽核資料。
    - 對每筆輸出執行 v3 schema 驗證、Task gate 與 byte-exact 原檔比對；彙總成功、保留阻擋與失敗原因。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: root
    state: planned
    fan_in_snapshot: 2
  TaskSnapshotV2ToV3Transformer:
    type: function
    description: 純記憶體內將單一 schema v2 Task JSON 轉為 v3 candidate，保留稽核資料並以 ADAD 1.6.2
      validator 驗證；不讀寫 Task 檔案、archive 或 source lock。
    source: scripts/migrate_adad_task_snapshots.py::_adad_validator,build_v3_candidate,validate_v3_candidate
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies:
    - AdadTaskSnapshotV2ToV3MigrationSpecification
    input:
      v2_task: 已解析的 schema_version=2 Task JSON
      migrated_at: 明確的 UTC timestamp
    output:
      v3_candidate: 通過 validator 的 schema_version=3 Task JSON
      validation_errors: 不可遷移時的結構化錯誤
    exceptions: []
    invariants:
    - 只接受 schema_version=2；不得改寫輸入 mapping，也不得處理 v3 快照。
    - task_id、node_name、status、source_lock、rollback、source_hash、implementation_hash（若有）與既有
      history 必須等值保留；只能附加一筆 migration history event。
    - 不得讀寫檔案、archive、checkpoint、Git index 或 source lock，也不得自動改變 Task 狀態。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_migrate_adad_task_snapshots.py
        - -q
        - -p
        - no:cacheprovider
        - --basetemp
        - C:\tmp\pytest-adad-task-snapshot-transformer
        cwd: project
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 深拷貝輸入、檢查必要 v2 稽核欄位並補齊 v3 target 的必要預設欄位。
    - 將 schema_version 改為 3，附加可追溯 migration history event，保留原本 status 與 hash。
    - 呼叫 ADAD 1.6.2 snapshot validator；成功回傳 candidate，失敗回傳結構化錯誤。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: root
    state: deployed
    fan_in_snapshot: 1
  TaskSnapshotV2ToV3Runner:
    type: script
    description: 預設 dry-run 掃描 Task 快照並產生 manifest；apply 時以 archive、逐筆驗證與原子替換執行已驗證的
      v2→v3 遷移。
    source: scripts/migrate_adad_task_snapshots.py::migrate_tasks,main
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies:
    - AdadTaskSnapshotV2ToV3MigrationSpecification
    - TaskSnapshotV2ToV3Transformer
    input:
      tasks_dir: 相對於專案根目錄的 Task 目錄；預設 .agents/tasks
      mode: dry-run（預設）或 --apply
      archive_dir: --apply 必填、位於 .agents/ 下且為空或不存在的本機 archive 目錄
    output:
      migration_manifest: JSON，逐筆列出 skipped、migrated、blocked、failed、原檔 SHA-256 與 archive
        路徑
    exceptions: []
    invariants:
    - 未帶 --apply 時不得寫入 Task、source lock、archive、checkpoint、Git index 或任何帳務程式檔案。
    - --apply 只能處理 schema_version=2 的 *.task.json；schema_version=3 與非 Task 檔案必須跳過且不改寫。
    - 每筆替換前必須保存 byte-exact 原檔 archive 與 SHA-256；archive 寫入或 candidate 驗證失敗時不得替換原 Task。
    - 不得自動核准、提交、駁回、重開或釋放任何 Task／source lock；submitted 仍必須保持 submitted。
    - tasks_dir 與 archive_dir 解析後必須位於專案 .agents/ 範圍；不得接受 checkpoint 或任意外部路徑。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_migrate_adad_task_snapshots.py
        - -q
        - -p
        - no:cacheprovider
        - --basetemp
        - C:\tmp\pytest-adad-task-snapshot-runner
        cwd: project
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: required
      signals:
      - kind: log
        name: migration_manifest.json
    complexity: medium
    algorithm:
    - 驗證 CLI 路徑與模式，掃描 tasks_dir 根層的 *.task.json，讀取並輸出 dry-run manifest。
    - 對每筆 v2 Task 委派 TaskSnapshotV2ToV3Transformer 建立並驗證 candidate。
    - apply 時先建立 byte-exact archive，再寫入同目錄暫存檔並驗證，最後以原子 replace 更新單筆 Task。
    - 單筆錯誤記錄於 manifest 後繼續其餘快照；結束時以非零 exit 表示有 blocked 或 failed，並保留完整 manifest。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: root
    state: deployed
    fan_in_snapshot: 0
  BackfillSubsidyReturnObligations:
    type: script
    description: 以兩階段安全性、可預演、可稽核的方式，掃描歷史已全額收款且符合條件但尚未啟用補助款退還義務的案件，重算到期日並寫入正式義務。
    source: scripts/backfill_subsidy_return_obligations.py
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies:
    - PaymentSchema
    - ClientSubsidyReturnObligationService
    - OrderAmountCalculator
    - AccountingSourceProjection
    input:
      mode: 預設 --dry-run（產生含 checksum 之 manifest.json），帶入 --apply --manifest manifest.json
        才執行正式寫入
      database_config: 由 .env 或明確測試設定取得的資料庫連線
    output:
      backfill_manifest: 含掃描筆數、符合筆數、已啟用筆數、跳過原因、Checksum 與 Audit log 的 JSON 報告
    exceptions: []
    invariants:
    - 兩階段安全性：--dry-run 必須輸出 manifest.json；--apply 必須指定 --manifest 並驗證 checksum，不得無
      manifest 直接全載寫入。
    - 預設 --dry-run 不得寫入資料庫或改寫既有帳務欄位。
    - 只有 amount_received 等於 amount_receivable 且 actual_end_date 非空且 calculated_return_amount
      大於零的歷史案件可建立義務。
    - 遇到 OrderAmountCalculator 不支援的身分類別（如低收入戶）必須標記為 review_required 並跳過，不得自行轉為其他資格或預設為
      0。
    - --apply 執行時，必須逐案下 SELECT ... FOR UPDATE 鎖定列並重新核對完工與滿額條件後，才在獨立 Transaction 中調用
      activate_subsidy_return_obligation()。
    - --apply 不得信任 manifest 內的舊計價事實；每案必須在鎖定後透過 AccountingSourceProjection 重新讀取 actual_end_date、identity_status、服務條件與
      collection_schedule，重新計算金額及到期日，且與 manifest 完全一致才可啟用。
    - 已存在相同退還義務之案件僅記錄 skipped_existing，不同義務則記錄 review_required 並拒絕覆寫。
    preferred_pattern: none
    verification:
    - must_have_assertions
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_backfill_subsidy_return_obligations.py
        - -q
        cwd: project
        timeout: 60
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 查詢 client_payments 結合 orders 與 clients，尋找 amount_received == amount_receivable
      且 subsidy_return_receivable 為空或零之案件。
    - 透過 AccountingSourceProjection 載入資料，驗證 actual_end_date 非空且身份資格支援。以 OrderAmountCalculator
      計算 subsidy_return_amount，並以 calculate_subsidy_return_due_date 計算到期日（實際完成月份月底＋5天）。
    - 若為 --dry-run 模式，輸出含預計啟用案件、狀態、Audit Log 與 SHA-256 Checksum 之 manifest.json。
    - 若為 --apply 模式，校驗 manifest checksum，逐案建立 connection/transaction，鎖定並重新投影及計算；單案成功即
      commit、失敗即 rollback 並記錄後繼續，其餘案件不得被連帶回滾。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: root
    state: validated
    fan_in_snapshot: 0
domains: {}
