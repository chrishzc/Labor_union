    - 同月嫂的待付款依每筆服務指派／case_no 獨立計數，不以 staff_id 覆蓋或合併案件。
    - 只有成功交易計入淨額；失敗交易忽略，沖正與退匯以反向金額抵銷原成功交易。
    idempotency:
