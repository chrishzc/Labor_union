  FinanceImportRawStagingSchema:
    type: database_schema
    description: 保存每次 Excel 匯入批次、不可覆寫的正規化銀行流水及其跨檔案出現紀錄，讓分類與核銷分成兩階段執行。
    source: db/schema_parts/60_finance_import_staging.sql
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies:
    - ServicesLayer
    input:
      normalized_rows: 通過 FinanceNormalizedRowValidator 的流水列
    output:
      finance_import_batches: 匯入批次
      finance_import_rows: 以 dedup_fingerprint 唯一識別、不可覆寫的原始銀行流水、分類狀態與可供人工審核的解析後對方帳號
      finance_import_occurrences: 每次來源檔實際帶入該流水的位置紀錄
    exceptions: []
    invariants:
    - batch 必須保存 format_id、source_file、sheet_name、header_row、row_count 及 status；欄位名稱必須與
      staging service 完全一致。
    - canonical row 必須保存 dedup_fingerprint、format_id、來源帳戶、日期時間、方向、支出、存入、餘額、摘要、備註、對方姓名、原始對方帳號、resolved_counterparty_account、銷帳編號、所有銀行參考欄位、warnings、raw_payload
      及 matched_identity_ids。
    - dedup_fingerprint 必須為非空 64 字元小寫 SHA-256 並在 canonical row 跨批次唯一；schema 不得允許以
      NULL 繞過唯一鍵。
    - 原始 counterparty_account 與其他原始內容欄位建立後不可由分類或核銷流程覆寫；resolved_counterparty_account
      是可空的分類結果欄位，必須與原始欄位分離。
    - resolved_counterparty_account 只有精確帳號唯一命中時可保存完整帳號；不得由姓名、部分帳號、金額或 Excel 列序推測。重複
      fingerprint 不得重新解析或覆寫既有值。
    - additive migration 不得自動回填既有 canonical rows；既有 NULL 保持原狀，後續只能透過明確人工重審流程處理，不得靜默重跑分類。
    - source_reference 未確認時允許為 NULL；不得使用檔名或 Excel 列號冒充銀行唯一流水號。
    - occurrence 以 batch_id、sheet_name、source_row 唯一並連回 canonical row。
    - 正式帳務 FK 不得成為保存未知流水的必要條件；同一來源檔內完全相同 fingerprint 的多列須保留 occurrence 並可標記警示。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -c
        - from pathlib import Path; s=Path('db/schema_parts/60_finance_import_staging.sql').read_text(encoding='utf-8');
          assert all(x in s for x in ('finance_import_batches','finance_import_rows','finance_import_occurrences','dedup_fingerprint','matched_identity_ids','resolved_counterparty_account','classification_type','reconciliation_status'));
          assert 'UNIQUE' in s; print('FINANCE IMPORT STAGING SCHEMA DECLARED')
        cwd: project
        expect_exit: 0
        expect_stdout_contains: FINANCE IMPORT STAGING SCHEMA DECLARED
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 建立或升級 schema 時將 dedup_fingerprint 設為 NOT NULL，並以可重跑的 additive migration 新增可空
      resolved_counterparty_account；新增欄位不回填既有列。既有表若含 NULL fingerprint 必須明確失敗並要求處理，不得偽造值後強制升級。
    - 建立 import batch header；首次 fingerprint 建立 canonical row及 occurrence，再次出現只新增 occurrence。
    - 由 dedup_fingerprint 提供技術去重；可空 source_reference 僅保存銀行原始值，不承擔唯一性。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: root
    state: deployed
    fan_in_snapshot: 9
