    - generate_roster_data
    - generate_schedule_data
    - main
    - parse_cli_args
    - validate_lifecycle_data
  PaymentSchema:
    type: database_schema
    description: 建立客戶帳務、正式服務指派與訂單層服務人員應付核心表；服務人員月結、實際轉帳及分配由獨立 Schema 節點擴充。
    source: db/schema.sql
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies: []
    input:
      case_no: canonical order identifier
      client_cashflow: three collection stages plus active subsidy-return obligation
        and transaction fields
      staff_assignments: one or more caregiver service segments per case
      cash_transactions: immutable client receipts/subsidy returns and legacy-compatible
        staff payable transactions
    output:
      client_payments: one client ledger summary per case_no
      client_payment_transactions: many actual client cash events per case_no
      case_staff_assignments: many caregiver service segments per case_no
      staff_payments: one payable obligation per caregiver service assignment
      staff_payment_transactions: legacy-compatible per-payable transaction projection
    exceptions: []
    invariants:
    - '`client_payments.case_no` 必須唯一且存在於 `orders.case_no`；`staff_payments.case_no`
      不得唯一，唯一應付鍵為正式服務指派。'
    - 每筆 `case_staff_assignments` 必須同時關聯有效的 `orders.case_no` 與 `staff.id`；`orders.staff_id`
      不得作為正式薪資歸屬來源。
    - 同案所有有效服務指派的核定時數總和不得超過案件實際服務總時數；同一時段若有交接，合計時數仍不得超過該日服務時數。
    - 一個服務指派最多只能產生一筆 `staff_payments` 應付摘要，但同一 `staff_id` 可跨多個案件或多個服務區段持有多筆應付摘要。
    - 同案所有服務指派的 `floor_fee_allocated` 不得重複，任何時點加總不得超過 `orders.floor_fee`，結案時必須恰等於訂單樓層費。
    - 客戶帳務不得包含月嫂實付欄位；月嫂帳務不得包含客戶三階段收款欄位。
    - 實收、實退與實付必須保存於不可直接覆寫的交易明細；成功金額必須大於零並具有實際日期，沖正必須反向關聯原交易。
    - 相同外部交易識別不得重複入帳；失敗或退匯交易不得計入實收或實付淨額。
    - '`orders` 不得存在 `other_addition`；`service_salary` 是純薪資，月嫂總應付以 `service_salary
      + floor_fee` 表示。'
    - 客戶帳務的 `subsidy_return_*` 只表示退還客戶預付補助款，不得用於一般退款或解約退款；legacy `subsidy_refund_*`
      只保留相容，不得成為新流程寫入目標。
    - '`orders.deposit_service_days` 為非負整數且不得超過 `orders.service_days`；不得由身分資格或舊檢視表推測其值。'
    - 新的跨案銀行事件不得拆成多筆偽造 external_reference 寫入 `staff_payment_transactions`。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -c
        - from pathlib import Path; s=Path('db/schema.sql').read_text(encoding='utf-8');
          tables=('client_payments','client_payment_transactions','case_staff_assignments','staff_payments','staff_payment_transactions','payment_migration_reviews');
          assert all(f'CREATE TABLE IF NOT EXISTS {n}' in s for n in tables); assert
          all(c in s for c in ('subsidy_return_receivable','subsidy_return_refunded','subsidy_return_due_date','subsidy_return_at'));
          print('CORE PAYMENT SCHEMA DECLARED')
        cwd: project
        expect_exit: 0
        expect_stdout_contains: CORE PAYMENT SCHEMA DECLARED
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - '`client_payments` 一案一筆，欄位依序保存訂金、第一期、第二期的應收／實收金額與日期，最後保存應收總額、實收總額及保留的退還補助金額摘要；各階段實收金額由交易明細加總，實收日期代表該階段完成核銷日。'
    - '`client_payment_transactions` 逐筆保存入款、退款、沖正與外部交易識別，允許同一階段部分付款及失敗後重送，不以覆寫摘要欄位取代歷史。'
    - '`case_staff_assignments` 將同一案件拆成一至多個服務區段，每段記錄月嫂、起訖日、核定時數、單價、替補原因及前一服務指派；媒合意願紀錄不得當作正式服務指派。'
    - '`staff_payments` 以服務指派為應付單位，分列服務時數、服務薪資、分配樓層費、調整金額、應付總額與應付日期；同一月嫂可同時持有不同 `case_no`
      的多筆待付款。'
    - '`staff_payment_transactions` 保留既有逐應付交易相容結構；新的月結銀行事件不得為跨案件付款複製成多筆外部流水。'
    - 樓層費由案件明確分配至各服務指派；結案時計算所有指派的薪資與樓層費，加總後才形成案件對月嫂的總應付。
    - '`orders.deposit_service_days` 保存訂單表單選定的訂金天數；可為 null 以保留未補齊的歷史案件，任何自動建帳流程遇到
      null 必須停止並回報人工補齊，不得套用舊 5／0 天預設。'
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: root
    state: deployed
    fan_in_snapshot: 14
  StaffMonthlySettlementSchema:
    type: database_schema
    description: 建立每位服務人員每個薪資歸屬月一張月結的摘要表；只保存月結總額與狀態，不保存銀行逐筆交易。
    source: db/schema_parts/20_staff_monthly_settlements.sql
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies:
    - PaymentSchema
    input:
      staff_id: settlement owner
      settlement_month: immutable payroll period supplied by the monthly preparation
        service
      payable_totals: total payable snapshot and derived paid total
    output:
      staff_monthly_settlements: staff/month settlement header
    exceptions: []
    invariants:
    - '`staff_id` 必須存在於 staff；settlement_month 必須是月份首日且建立後不可改變。'
    - total_payable 與 total_paid 不得為負；total_paid 不得超過 total_payable。
    - finalized 月結不得覆寫應付總額或重新歸屬月份。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -c
        - from pathlib import Path; p=Path('db/schema_parts/20_staff_monthly_settlements.sql');
          s=p.read_text(encoding='utf-8'); assert 'CREATE TABLE IF NOT EXISTS staff_monthly_settlements'
          in s; assert 'FOREIGN KEY (staff_id)' in s; assert 'settlement_month' in
          s and 'total_payable' in s and 'total_paid' in s; assert 'staff_monthly_settlement_details'
          not in s and 'staff_actual_transfers' not in s; print('STAFF MONTHLY SETTLEMENT
          SCHEMA DECLARED')
        cwd: project
        expect_exit: 0
        expect_stdout_contains: STAFF MONTHLY SETTLEMENT SCHEMA DECLARED
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 建立 `staff_monthly_settlements`，保存 staff_id、settlement_month、revision、total_payable、total_paid、status、finalized_at
      與 timestamps。
    - 同一 staff_id、settlement_month 與有效 revision 只能有一張月結；銀行 occurred_at 不得改寫 settlement_month。
    - total_paid 只作交易分配的投影欄位，不得由人工直接覆寫。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: root
    state: deployed
    fan_in_snapshot: 6
  StaffMonthlySettlementDetailSchema:
    type: database_schema
    description: 建立服務人員月結的逐訂單／逐服務指派應付快照，保留一般薪資、樓層費、調整額及舊制補助構成。
    source: db/schema_parts/30_staff_monthly_settlement_details.sql
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies:
    - PaymentSchema
    - StaffMonthlySettlementSchema
    input:
      settlement_id: parent monthly settlement
      staff_payment_id: assignment-level payable source
      payable_snapshot: case, assignment and payable component values frozen for this
        settlement
    output:
      staff_monthly_settlement_details: immutable settlement items linked to existing
        staff payments
    exceptions: []
    invariants:
    - detail.staff_id 必須等於 settlement.staff_id 及 staff_payment.staff_id。
    - case_no、assignment_id 必須與來源 staff_payment 一致；payable_amount 必須等於已凍結應付構成合計且不得為負。
    - 月結 finalized 後明細不可刪除、換月或覆寫；未確認的舊制補助構成必須標記 review_required。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -c
        - from pathlib import Path; s=Path('db/schema_parts/30_staff_monthly_settlement_details.sql').read_text(encoding='utf-8');
          assert 'CREATE TABLE IF NOT EXISTS staff_monthly_settlement_details' in
          s; assert all(x in s for x in ('settlement_id','staff_payment_id','case_no','assignment_id','payable_amount','legacy_subsidy_payable'));
          assert 'FOREIGN KEY (settlement_id)' in s and 'FOREIGN KEY (staff_payment_id)'
          in s; assert 'staff_actual_transfers' not in s; print('STAFF MONTHLY SETTLEMENT
          DETAIL SCHEMA DECLARED')
        cwd: project
        expect_exit: 0
        expect_stdout_contains: STAFF MONTHLY SETTLEMENT DETAIL SCHEMA DECLARED
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 建立 `staff_monthly_settlement_details`，保存 settlement_id、staff_payment_id、case_no、assignment_id、staff_id、一般薪資、舊制補助構成、樓層費、調整額、payable_amount
      與覆核狀態。
    - 月結明細建立時由 `staff_payments` 及已確認計算結果凍結來源值；不得用實際銀行金額反寫應付快照。
    - 同一 staff_payment 在同一月結不得重複；已屬其他有效月結時由服務層拒絕再次納入。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: root
    state: deployed
    fan_in_snapshot: 4
  StaffActualTransferSchema:
    type: database_schema
    description: 建立服務人員實際銀行轉帳事件表；新制單次薪資與舊制第一次薪資、第二次補助款均逐筆保存，不直接綁定案件。
    source: db/schema_parts/40_staff_actual_transfers.sql
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies:
    - PaymentSchema
    - StaffMonthlySettlementSchema
    input:
      settlement_id: uniquely matched staff monthly settlement
      bank_event: staff, phase, type, status, amount, date, bank identity and external
        reference
    output:
      staff_actual_transfers: immutable staff bank transfer, return and reversal events
    exceptions: []
    invariants:
    - external_reference 必須唯一；成功交易金額必須大於零且有 occurred_at。
    - transfer.staff_id 必須與 settlement.staff_id 一致；銀行事件不得為多案件複製多筆。
    - failed 不得計入實付；return/reversal 缺少原交易關聯時不得生效。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -c
        - from pathlib import Path; s=Path('db/schema_parts/40_staff_actual_transfers.sql').read_text(encoding='utf-8');
          assert 'CREATE TABLE IF NOT EXISTS staff_actual_transfers' in s; assert
          all(x in s for x in ('settlement_id','staff_id','payment_phase','transaction_type','transaction_status','amount','occurred_at','external_reference','reversal_of_transfer_id'));
          assert 'UNIQUE' in s and 'FOREIGN KEY (settlement_id)' in s and 'FOREIGN
          KEY (staff_id)' in s; assert 'staff_transfer_allocations' not in s; print('STAFF
          ACTUAL TRANSFER SCHEMA DECLARED')
        cwd: project
        expect_exit: 0
        expect_stdout_contains: STAFF ACTUAL TRANSFER SCHEMA DECLARED
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 建立 `staff_actual_transfers`，保存 settlement_id、staff_id、payment_phase、transaction_type、transaction_status、amount、occurred_at、source_bank、source_account、counterparty_account、external_reference、reversal_of_transfer_id
      與 raw import reference。
    - payment_phase 支援 normal、first_salary、second_subsidy、unknown；未知時只保存待覆核，不得靠金額猜測付款階段。
    - transfer、return、reversal 各保存獨立事件；return/reversal 必須關聯原成功 transfer。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: root
    state: deployed
    fan_in_snapshot: 3
  StaffTransferAllocationSchema:
    type: database_schema
    description: 建立實際服務人員轉帳與月結明細的多對多分配，使一筆轉帳可支付多筆訂單、同一訂單亦可由舊制兩次付款共同支付。
    source: db/schema_parts/50_staff_transfer_allocations.sql
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies:
    - StaffMonthlySettlementDetailSchema
    - StaffActualTransferSchema
    input:
      transfer_id: actual staff bank event
      settlement_detail_id: payable snapshot being settled
