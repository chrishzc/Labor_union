    description: 重新驗證管理者明確提交的訂單變更、完整目標正式月嫂指派計畫與明確排班移除計畫；僅在預覽等價驗證、帳務鎖定與時數總和均通過時，以單一交易更新訂單、正式指派與受影響
      assignment-owned 日排班，確認總時數、檢測滿額收款自動啟用補助退還義務並寫入 append-only 稽核快照。
    source: services/order_assignment_synchronization.py::apply_order_assignment_sync
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies:
    - PaymentSchema
    - MultiCaregiverScheduleSchema
    - OrderAssignmentChangeAuditSchema
    - MultiCaregiverAssignmentRules
    - MultiCaregiverScheduleGenerationTransactionService
    - ActualHoursAdjustmentConfirmationService
    - OrderAssignmentSynchronizationPreviewService
    - ClientSubsidyReturnObligationService
    - OrderAmountCalculator
    - AccountingSourceProjection
    input:
      case_no: 明確指定的 canonical case number
      order_change: 非取消訂單的完整可編輯目標值；必含 service_days、service_hours_per_day、start_date、end_date、actual_start_date、actual_end_date、client_name
        與 floor_fee；deposit_date 可為 null，身分資格由 case_no 關聯 clients.identity_status
        唯讀取得
      assignment_plan: 一筆以上明確指定 staff_id、服務起訖日期、既有 assignment_id（更新時）與指派順序的完整目標有效配置；未列出的既有有效指派視為明確取消候選，不得由系統猜測新增月嫂或日期
      schedule_change_plan: 物件，含 required_schedule_removals 對應的完整 remove_schedule_ids
        正整數清單；只允許移除受影響正式指派擁有的列
      applied_by: 非空操作識別
    output:
      apply_result: 已套用訂單與客戶主資料快照、正式指派快照、受影響排班重建結果、付款確認結果與新稽核列 id
    exceptions: []
    invariants:
    - 未提供完整明確 assignment_plan 或完整 schedule_change_plan 時只能回傳 requires_allocation，絕不得猜測哪位月嫂、哪個區段或哪一筆日排班應增減或移除。
    - apply 必須全有或全無，不得在訂單已更新而指派、日排班、確認或稽核失敗時 commit。
    - 不得呼叫或重用會自行 commit 的 db_service.update_order_full_details；同步所需訂單與客戶主資料更新必須由此交易持有的
      cursor 完成。
    - 已有非 cancelled staff_payments、有效月結明細或 actual_hours_adjustments 的受影響指派不得重排、取消、改日期或改算
      actual_hours；必須回傳具體鎖定／人工覆寫原因。
    - 所有未取消正式指派的 actual_hours 必須以 Decimal 精確等於訂單總服務時數；取消指派不得計入總和，legacy assignment_id
      為 NULL 排班不得被採用、移除或覆寫。
    - 只可刪除 schedule_change_plan 明確列出的、屬於受影響正式指派的排班列；必須拒絕遺漏、多列、其他案件、其他指派或 legacy 列。
    - 當完工流程寫入/更新 actual_end_date 時，若案件已滿額收款且未啟用義務，必須在同一 transaction 內觸發 activate_subsidy_return_obligation。
    - 觸發點 2 必須使用 AccountingSourceProjection 的 transaction cursor 版本；任何非明確 review_required
      結果的錯誤都必須 rollback 整個 apply。
    - 不建立、修改或取消 staff_payments、staff_monthly_settlements、轉帳或其明細；既有財務資料只能作為鎖定依據。
    - 身分資格只能讀取 clients.identity_status；不得讀寫 clients.identity_status 或修改 clients.identity_status。
    - 每次成功 apply 必須新增一筆 OrderAssignmentChangeAuditSchema 稽核列；失敗或拒絕不得新增稽核列。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_order_assignment_synchronization.py
        - -k
        - apply
        - -q
        - -p
        - no:cacheprovider
        cwd: project
        timeout: 60
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 以 case_no 鎖定訂單、既有指派與受影響排班；再次執行與 OrderAssignmentSynchronizationPreviewService
      等價的驗證，拒絕 stale plan、同月嫂日期衝突、legacy 排班衝突、未明確分配、未覆蓋目標時數或與當前 required_schedule_removals
      不完全一致的 schedule_change_plan。
    - 僅在所有驗證通過後，刪除明確列出的受影響 assignment-owned 排班列，在同一 transaction 更新訂單服務欄位與可編輯訂單主資料、同步該
      case_no 的客戶姓名，建立或更新明確正式指派，取消完整目標計畫中未列出且未鎖定的指派，並以交易內生成器補足受影響有效指派的新日期排班；不得變更 clients.identity_status、其他案件或
      legacy 排班。
    - 觸發點 2（收清後完工）：更新 actual_end_date 時，若該案 client_payments 已為滿額收款 (amount_received
      == amount_receivable) 且未啟用義務，透過 AccountingSourceProjection 與 OrderAmountCalculator
      計算 subsidy_return_amount，若大於零且身分資格支援，於同一個 transaction 內呼叫 ClientSubsidyReturnObligationService
      (activate_subsidy_return_obligation) 啟用補助退還義務。
    - 投影、計算或義務啟用發生非業務預期錯誤時必須拋出並由外層 rollback；不得吞掉例外後提交已完工但未建立義務的部分結果。
    - 以 ActualHoursAdjustmentConfirmationService 的同等 Decimal 確認邏輯驗證所有未取消指派 actual_hours
      總和恰等於 orders.service_days × orders.service_hours_per_day；不相等即 rollback。
    - 同一交易最後新增 OrderAssignmentChangeAuditSchema 稽核快照並 commit，回傳已套用結果；任何例外均 rollback。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals:
    - 不提供 UI、HTTP router、薪資建立、月結重算、人工 actual_hours 覆寫、訂單取消或歷史鎖定資料的沖正流程。
    - 不支援同日分時段；不將 orders.staff_id 或 matching_records 視為正式服務指派。
    sub_map: root
    state: validated
    fan_in_snapshot: 2
