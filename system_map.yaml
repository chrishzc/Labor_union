  GenerateFakeData:
    type: script
    description: 已凍結的歷史假資料產生器，僅供人工閱讀既有資料結構與情境設計；不再是可執行工具、啟動流程或可被匯入的執行期模組。任何新增假資料條件必須建立獨立腳本、獨立測試與獨立
      ADAD 節點／Task。
    source: scripts/generate_fake_data.py
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies: []
    input:
      source_reference: 人工唯讀檢視 scripts/generate_fake_data.py 內既有歷史邏輯；不構成 CLI、import
        或函式呼叫介面。
      attempted_invocation: 任何直接執行、import 或呼叫 main() 的嘗試都必須立即拒絕。
    output:
      frozen_error: 固定、可辨識的非零退出訊息，說明 GenerateFakeData 已凍結且新需求必須另建產生腳本。
    exceptions: []
    invariants:
    - scripts/generate_fake_data.py 必須在任何 import、CLI 解析、路徑建立、檔案讀寫或資料庫連線前 fail fast；直接執行與
      import 都必須非零失敗並回傳 frozen_error。
    - '`main()` 不得再啟動歷史生成流程；既有參數（包含 --seed-db、--replace-demo-db、--seed 與 --reference-date）全部失效且不得觸發任何副作用。'
    - 凍結後不得建立、更新或刪除名冊、Excel、排班、帳務、資料庫資料或其他產物；既有假資料檔與既有資料列保持原狀。
    - 既有歷史實作全文只保留為人工參考，禁止其他程式碼 import、呼叫或把它當成函式庫／執行期相依。
    - 本次 Task 只允許加入凍結閘門與將既有測試改為凍結契約測試；不得修正、重構、擴充或重新啟用任何歷史生成邏輯。
    - 所有新增假資料條件都必須使用不同的 source path，建立獨立命名的 ADAD 節點、Task 與測試；不得把 Dependencies 或 consumers
      加回 GenerateFakeData。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_generate_fake_data.py
        - -q
        - -p
        - no:cacheprovider
        cwd: project
        timeout: 120
        expect_exit: 0
        expect_stdout_contains: passed
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - py_compile
        - scripts\generate_fake_data.py
        cwd: project
        timeout: 60
        expect_exit: 0
    decisions: []
    todo:
    - 後續需要 A~G 類別邊界資料時，另建 scripts/seed_boundary_anomalies.py、同名獨立 ADAD 節點／Task 與專屬測試；不得解除或修改本凍結節點。
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm:
    - 模組載入時於 docstring 後、所有 import 與其他可執行敘述前拋出固定 frozen_error，確保直接執行與 import 都不會進入歷史生成程式。
    - 保留閘門後方的既有歷史實作供人工閱讀；不得由任何啟動腳本、測試或正式模組到達該段程式。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals:
    - 不再產生、更新、重播、修復或對帳既有 50 筆客戶、月嫂、案件、排班、Excel 或帳務假資料。
    - 不把 GenerateFakeData 當作未來新腳本的共用函式庫，也不在本節點新增任何條件、schema 相容或業務規則。
    sub_map: root
    state: deployed
    fan_in_snapshot: 0
    known_symbols:
    - _assign_available_staff
    - _clear_generator_owned_demo_data
    - _core_case_nos
    - _derive_payment_dates
    - _finance_duplicate_normalized_result
    - _import_seed_master_data
    - _prepare_seed_database
    - _prorate_amount
    - _rest_weekdays_for_service_mode
    - _scenario_counts
    - _scenario_note
    - _schedule_end_date
    - _schedule_rows_for_segment
    - _schedule_start_for_completed_service
    - _segment_work_day_counts
    - _upsert_payment
    - _write_boundary_transaction
    - _write_scenario_schedule
    - build_lifecycle_fixture_plan
    - fill_checkbox_group
    - fixture_admin_note
    - generate_fake_address
    - generate_fake_due_date
    - generate_fake_id_card
    - generate_fake_ip
    - generate_fake_line_id
    - generate_fake_name
    - generate_fake_phone
    - generate_fake_service_start_date
    - generate_fake_signup_time
    - generate_finance_data
    - generate_historical_order_fixture
    - generate_lifecycle_scenarios
    - generate_roster_data
    - generate_schedule_data
    - main
    - parse_cli_args
    - seed_assignment_payroll_facts
    - seed_client_payment_boundary_facts
    - seed_finance_import_duplicate_fact
    - validate_lifecycle_data
    - validate_seed_database
  FinanceImportStagingContract:
    type: dependency_contract
    description: Master map 對 services_layer／FinanceImportStagingService 的跨子地圖依賴合約，供後續獨立建立的假資料或匯入腳本以正式
      staging 介面建立匯入批次、canonical row 與 occurrence，而不複製下層服務實作；已凍結的 GenerateFakeData
      不再使用本合約。
    source: document/資料庫、資料處理/帳務假數據生成與關聯測試規格.md
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies: []
    input:
      normalized_result: 已正規化且保留來源欄位、銀行參照與 raw payload 的匯入結果
      identity_maps: 客戶退款與服務人員精確帳號 mapping
    output:
      staging_result: batch_id 與逐列 inserted／skipped_existing、canonical row、occurrence
        結果
    exceptions: []
    invariants:
    - 實作唯一落點仍為 services_layer 的 FinanceImportStagingService；本合約不持有 Source 或資料庫寫入邏輯。
    - 同 fingerprint 只能有一筆 canonical row；重複匯入只新增 occurrence，不得覆寫或重新分類既有 canonical row。
    - 後續獨立建立的假資料或匯入腳本若需寫入 staging，必須呼叫正式 staging 介面，不得自行複製其去重 SQL 或略過 append-only
      邊界。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_finance_import_staging.py
        - -q
        - -p
        - no:cacheprovider
        cwd: project
        timeout: 120
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm: []
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals:
    - 不取代、不搬移或重複宣告 services_layer 的 FinanceImportStagingService 實作節點。
    sub_map: root
    state: planned
    fan_in_snapshot: 0
  PaymentSchema:
    type: database_schema
    description: 建立客戶帳務、正式服務指派與訂單層服務人員應付核心表；服務人員月結、實際轉帳及分配由獨立 Schema 節點擴充。
    source: db/schema.sql
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies: []
    input:
      case_no: canonical order identifier
      client_cashflow: three collection stages plus active subsidy-return obligation
        and transaction fields
      staff_assignments: one or more caregiver service segments per case
      cash_transactions: immutable client receipts/subsidy returns and legacy-compatible
        staff payable transactions
    output:
      client_payments: one client ledger summary per case_no，含補助退還義務與可空人工覆核狀態／原因
      client_payment_transactions: many actual client cash events per case_no
      case_staff_assignments: many caregiver service segments per case_no
      staff_payments: one payable obligation per caregiver service assignment
      staff_payment_transactions: legacy-compatible per-payable transaction projection
      actual_hours_adjustments: append-only manual actual-hours audit records
    exceptions: []
    invariants:
    - '`client_payments.case_no` 必須唯一且存在於 `orders.case_no`；`staff_payments.case_no`
      不得唯一，唯一應付鍵為正式服務指派。'
    - 每筆 `case_staff_assignments` 必須同時關聯有效的 `orders.case_no` 與 `staff.id`；`orders.staff_id`
      不得作為正式薪資歸屬來源。
    - 同案所有有效服務指派的核定時數總和不得超過案件實際服務總時數；同一時段若有交接，合計時數仍不得超過該日服務時數。
    - 一個服務指派最多只能產生一筆 `staff_payments` 應付摘要，但同一 `staff_id` 可跨多個案件或多個服務區段持有多筆應付摘要。
    - 同案所有服務指派的 `floor_fee_allocated` 不得重複，任何時點加總不得超過 `orders.floor_fee`，結案時必須恰等於訂單樓層費。
    - 客戶帳務不得包含月嫂實付欄位；月嫂帳務不得包含客戶三階段收款欄位。
    - 實收、實退與實付必須保存於不可直接覆寫的交易明細；成功金額必須大於零並具有實際日期，沖正必須反向關聯原交易。
    - 相同外部交易識別不得重複入帳；失敗或退匯交易不得計入實收或實付淨額。
    - '`orders` 不得存在 `other_addition`；`service_salary` 是純薪資，月嫂總應付以 `service_salary
      + floor_fee` 表示。'
    - clients.identity_status 是身分資格的唯一儲存來源，訂單與帳務表不得保存或寫入 clients.identity_status 的副本。
    - 客戶帳務的 `subsidy_return_*` 只表示退還客戶預付補助款，不得用於一般退款或解約退款；legacy `subsidy_refund_*`
      只保留相容，不得成為新流程寫入目標。
    - subsidy_return_review_status=review_required 時不得進入銀行流水自動核銷，但不得清除 subsidy_return_receivable、subsidy_return_due_date
      或使該筆離開預定月份歷史清單。
    - '`orders.deposit_service_days` 為非負整數且不得超過 `orders.service_days`；不得由身分資格或舊檢視表推測其值。'
    - 新的跨案銀行事件不得拆成多筆偽造 external_reference 寫入 `staff_payment_transactions`。
    - '`actual_hours` 的人工覆寫必須寫入 append-only 稽核紀錄，包含正式指派、調整前後值、非空原因、操作者與時間；不得覆寫或刪除既有稽核列。'
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -c
        - from pathlib import Path; s=Path('db/schema.sql').read_text(encoding='utf-8');
          tables=('client_payments','client_payment_transactions','case_staff_assignments','staff_payments','staff_payment_transactions','payment_migration_reviews','actual_hours_adjustments');
          assert all(f'CREATE TABLE IF NOT EXISTS {n}' in s for n in tables); assert
          all(c in s for c in ('subsidy_return_receivable','subsidy_return_refunded','subsidy_return_due_date','subsidy_return_at','subsidy_return_review_status','subsidy_return_review_reason'));
          print('CORE PAYMENT SCHEMA DECLARED')
        cwd: project
        timeout: 60
        expect_exit: 0
        expect_stdout_contains: CORE PAYMENT SCHEMA DECLARED
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - '`client_payments` 一案一筆，欄位依序保存訂金、第一期、第二期的應收／實收金額與日期，最後保存應收總額、實收總額及保留的退還補助金額摘要；各階段實收金額由交易明細加總，實收日期代表該階段完成核銷日。'
    - '`client_payment_transactions` 逐筆保存入款、退款、沖正與外部交易識別，允許同一階段部分付款及失敗後重送，不以覆寫摘要欄位取代歷史。'
    - '`case_staff_assignments` 將同一案件拆成一至多個服務區段，每段記錄月嫂、起訖日、核定時數、單價、替補原因及前一服務指派；媒合意願紀錄不得當作正式服務指派。'
    - '`staff_payments` 以服務指派為應付單位，分列服務時數、服務薪資、分配樓層費、調整金額、應付總額與應付日期；同一月嫂可同時持有不同 `case_no`
      的多筆待付款。'
    - '`staff_payment_transactions` 保留既有逐應付交易相容結構；新的月結銀行事件不得為跨案件付款複製成多筆外部流水。'
    - '`actual_hours_adjustments` 逐筆記錄人工覆寫前後時數、原因、操作者與時間；不取代指派或排班歷史。'
    - 樓層費由案件明確分配至各服務指派；結案時計算所有指派的薪資與樓層費，加總後才形成案件對月嫂的總應付。
    - '`orders.deposit_service_days` 保存訂單表單選定的訂金天數；可為 null 以保留未補齊的歷史案件，任何自動建帳流程遇到
      null 必須停止並回報人工補齊，不得套用舊 5／0 天預設。'
    - '`client_payments.subsidy_return_review_status` 與 `subsidy_return_review_reason`
      保存補助退還自動核銷暫停狀態；status 只允許 NULL 或 review_required，正常義務與歷史完成狀態仍由 receivable/refunded/at
      推導。'
    - 所有訂單計價與檢視 SQL 以 orders.client_id 關聯 clients.identity_status；移除 clients.identity_status
      及所有以該欄位計算的來源。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    sub_map: root
    state: deployed
    fan_in_snapshot: 25
  ClientIdentityStatusSourceMigration:
    type: script
    description: 以可稽核、可預演的方式，將身分資格唯一來源收斂至 clients.identity_status，並在所有消費端完成轉換後移除 clients.identity_status。
    source: scripts/migrate_client_identity_status_source.py
    domain: null
    subsystem: null
    map_file: system_map.md
    dependencies:
    - PaymentSchema
    input:
      mode: 預設 dry-run；只有明確 --apply 才可執行 migration。
      discard_fake_data: 僅與 --apply 同時提供時，表示現有資料庫為可拋棄假資料；只放寬空 identity_status 的資料前置檢查，絕不由舊欄位回填或推測身分。
      database_config: 由 .env 或明確測試設定取得的資料庫連線。
    output:
      migration_manifest: 每個前置檢查、受影響 orders 數量、移除前 SHOW CREATE TABLE 備份、已移除欄位與失敗原因的
        JSON 報告。
    exceptions: []
    invariants:
    - 預設 dry-run 不得寫入資料庫；--apply 前所有 clients.identity_status 必須非空，缺值必須 fail-closed。
    - 只有明確 --apply --discard-fake-data 可略過空 identity_status 的假資料前置檢查；manifest 必須記錄此危險模式、缺值筆數與每個重建前檢視定義。
    - 資料庫 metadata 回傳欄位名稱必須以大小寫無關方式解析；information_schema 與 SHOW CREATE 的 DictCursor
      實際回傳不得因 table_name／TABLE_NAME 等鍵名差異而跳過備份、重建或 DDL。
    - 不得以字串取代任意重寫 live view SQL；僅可由受版控 schema 的精確 v_order_details 定義重建已知檢視，任何其他受影響檢視必須
      fail-closed。
    - 不得以既有 clients.identity_status 回填、推測或修改 clients.identity_status。
    - 未完成所有消費端替換或任一非假資料前置驗證失敗時不得移除欄位；不得影響帳務、月結、交易或正式指派資料。
    - MySQL DROP COLUMN 為 atomic DDL 且隱式提交；移除後的 post-check 只能記錄成功／失敗，不得宣稱可 transaction
      rollback。apply 前必須把 SHOW CREATE TABLE 備份寫入 manifest 供人工復原。
    preferred_pattern: none
    verification:
    - command:
        argv:
        - .venv\Scripts\python.exe
        - -m
        - pytest
        - tests\test_client_identity_status_source_migration.py
        - -q
        - -p
        - no:cacheprovider
        - --basetemp
        - C:\tmp\pytest-client-identity-status-migration
        cwd: project
        timeout: 60
        expect_exit: 0
        expect_stdout_contains: passed
    decisions: []
    todo: []
    checkpoint: []
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - dry-run 先檢查每筆 orders.client_id 均能關聯到非空 clients.identity_status，並確認應用程式與 SQL
      來源均不再引用 clients.identity_status；任一失敗只輸出 manifest、零寫入。
    - --apply 在執行 DDL 前重跑全部前置檢查、擷取 SHOW CREATE TABLE，移除 clients.identity_status，並以
      clients.identity_status 重建依賴該欄位的資料庫檢視或計算來源。
    - --apply --discard-fake-data 仍必須拒絕任何應用程式或 SQL 來源引用；僅可略過既有假客戶空 identity_status
      的資料檢查，先備份每個受影響檢視定義；已知 v_order_details 必須由受版控 db/schema.sql 的 clients.identity_status
      正式定義重建，未知檢視拒絕後才執行 DROP COLUMN。
    - migration 完成後再次驗證資料庫 schema、計算查詢與 manifest；post-check 失敗只回報明確錯誤與移除前備份，不得臆測、改寫
      clients.identity_status 或宣稱已 rollback。
